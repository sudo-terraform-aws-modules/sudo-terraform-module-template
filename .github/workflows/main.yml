on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

name: Terraform CI

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: pre-commit
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: hashicorp/setup-terraform@v4

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        # terraform_validate requires `terraform init` - skipped in CI; covered by checkov.
        # terraform_docs requires terraform-docs binary - skipped in CI; runs locally.
        run: SKIP=terraform_validate,terraform_docs pre-commit run --all-files

  checkov:
    runs-on: ubuntu-latest
    name: checkov
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: checkov.yaml
          quiet: true
          soft_fail: false
          download_external_modules: true
